<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>

<header class="top-bar">
    <div class="home-wrapper">
        <a class="user-role" href="{{ url_for('index') }}">Головна</a>
    </div>

    <div class="user">
        <div class="icon">
            <img src="{{ url_for('static', filename='user-icon.png') }}" alt="Іконка користувача">
        </div>
        <span>{{ session.get('username', 'КОРИСТУВАЧ') }}</span>

        <nav class="user-menu">
            <a href="{{ url_for('logout') }}">Вихід</a>
        </nav>
    </div>
</header>

<div class="grid-background"></div>

<main class="login-box">
    <h2>Реєстрація</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="input-group">
            <label for="username">Користувач:</label>
            <input type="text" id="username" name="username" placeholder="Введіть ім'я користувача" required>
        </div>
        <div class="input-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" placeholder="Введіть пароль" required>
        </div>
        <button type="submit">Зареєструватися</button>
    </form>
</main>

</body>
</html>
